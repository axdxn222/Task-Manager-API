# GitHub Actions CI/CD Pipeline
# Place this at: .github/workflows/ci-cd.yml
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: "Lint and Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8 black
      - name: Check formatting
        run: black --check --line-length 100 .
      - name: Lint
        run: flake8 --max-line-length 100 --exclude=venv,.git .

  test:
    name: "Run Tests"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest test_app.py -v --tb=short --cov=app_main --cov-report=term-missing

  build:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          docker build -t task-api:${{ github.sha }} .
          docker build -t task-api:latest .
      - name: Smoke test
        run: |
          docker run -d -p 5000:5000 --name test-container task-api:latest
          sleep 3
          curl -f http://localhost:5000/health || exit 1
          docker stop test-container

  deploy:
    name: "Deploy (placeholder)"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: echo "Replace with real deploy commands (docker push, aws ecs, gcloud run, etc.)"